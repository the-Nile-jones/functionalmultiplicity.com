<!DOCTYPE html>

<style>

  <!-- Footer -->
  <text x="500" y="590" text-anchor="middle" class="body muted" font-size="10">Functional Multiplicity Meta-System — Nile Jones | functionalmultiplicity.com</text>
  <text x="500" y="607" text-anchor="middle" class="body muted" font-size="8">4 Members. 4 Circles. Unlimited characteristic sets. Your System, mapped.</text>

</svg>
</div>
